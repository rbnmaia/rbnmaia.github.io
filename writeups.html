---
layout: default
---

<div class="writeups">
  {% for writeup in site.writeups %}
    <article class="writeup">

      <h1><a href="{{ site.baseurl }}{{ writeup.url }}">{{ writeup.title }}</a></h1>

      <div class="entry">
        {{ writeup.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ writeup.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
